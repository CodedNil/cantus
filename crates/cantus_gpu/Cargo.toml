[package]
name = "cantus_gpu"
version = "0.1.0"
edition = "2024"

[lib]
crate-type = ["dylib", "lib"]

[dependencies]
cantus_shared = { path = "../cantus_shared", features = ["gpu"] }
spirv-std = { git = "https://github.com/Rust-GPU/rust-gpu", rev = "bd49568baf08301107c9f698494735724980dee0", features = [
    "glam_0_33",
] }

[lints]
workspace = true
