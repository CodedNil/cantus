[package]
name = "cantus_cpu"
version = "0.7.0"
edition = "2024"
build = "build.rs"

[[bin]]
name = "cantus"
path = "src/main.rs"

[dependencies]
cantus_shared = { path = "../cantus_shared", features = ["cpu"] }
glam = { workspace = true }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }

pollster = "0.4.0"
raw-window-handle = "0.6.2"

wayland-backend = { version = "0.3.15", features = ["client_system"] }
wayland-client = { version = "0.31.14", default-features = false }
wayland-protocols = { version = "0.32.13", features = ["client", "staging"] }
wayland-protocols-wlr = { version = "0.3.12", features = ["client"] }

wgpu = { version = "30.0.0", default-features = false, features = [
    "parking_lot",
    "spirv",
    "std",
    "vulkan",
    "wgsl",
] }
ab_glyph = "0.2.32"

time = { version = "0.3.53", features = ["serde"] }
image = { version = "0.25.10", default-features = false, features = [
    "jpeg",
    "png",
] }
kmeans_colors = { version = "0.7.1", default-features = false, features = [
    "palette_color",
] }
palette = "0.7.6"

serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
toml = "1.1.2"

fastrand = "2.4.1"
parking_lot = "0.12.5"
arrayvec = { version = "0.7.7", features = ["serde"] }
smallvec = "1.15.2"
itertools = "0.15.0"
dirs = "6.0.0"
thiserror = "2.0.18"
base64 = "0.22.1"
url = "2.5.8"
sha2 = "0.11.0"
bytemuck = { version = "1.25.0", features = ["derive"] }
webbrowser = "1.2.1"
ureq = { version = "3.3.0", default-features = false, features = ["rustls"] }

[build-dependencies]
spirv-builder = { git = "https://github.com/Rust-GPU/rust-gpu", rev = "bd49568baf08301107c9f698494735724980dee0" }

# `-Zbuild-std` needs registry crates from rust-src. Keep the crates missing from
# the application graph in the Nix vendor closure without building them here.
[target.'cfg(any())'.build-dependencies]
addr2line = "=0.25.1"
dlmalloc = "=0.2.13"
fortanix-sgx-abi = "=0.6.1"
getopts = "=0.2.24"
hermit-abi = "=0.5.2"
moto-rt = "=0.16.0"
r-efi-alloc = "=2.1.0"
rand_xorshift = "=0.4.0"
rustc-literal-escaper = "=0.0.7"
rust-src-cc = { package = "cc", version = "=1.2.0" }
rust-src-libc = { package = "libc", version = "=0.2.185" }
rust-src-memchr = { package = "memchr", version = "=2.7.6" }
rust-src-rand = { package = "rand", version = "=0.9.2" }
rust-src-rand-core = { package = "rand_core", version = "=0.9.3" }
rust-src-shlex = { package = "shlex", version = "=1.3.0" }
rust-src-wasip2 = { package = "wasip2", version = "=1.0.3" }
unwinding = "=0.2.8"
vex-sdk = "=0.27.1"
wasip1 = "=1.0.0"
wasip3 = "=0.6.0"

[lints]
workspace = true
