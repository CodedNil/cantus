[package]
name = "cantus_cpu"
version = "0.7.0"
edition = "2024"

[[bin]]
name = "cantus"
path = "src/main.rs"

[dependencies]
cantus_shared = { path = "../cantus_shared", features = ["cpu"] }
glam = { workspace = true }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }

pollster = "1.0.1"
raw-window-handle = "0.6.2"

wayland-backend = { version = "0.3.15", features = ["client_system"] }
wayland-client = { version = "0.31.14", default-features = false }
wayland-protocols = { version = "0.32.13", features = ["client", "staging"] }
wayland-protocols-wlr = { version = "0.3.12", features = ["client"] }

wgpu = { version = "30.0.0", default-features = false, features = [
    "parking_lot",
    "spirv",
    "std",
    "vulkan",
] }
ab_glyph = "0.2.32"

time = { version = "0.3.53", features = ["serde"] }
image = { version = "0.25.10", default-features = false, features = [
    "jpeg",
    "png",
] }
kmeans_colors = { version = "0.7.1", default-features = false, features = [
    "palette_color",
] }
palette = { version = "0.7.6", default-features = false, features = ["std"] }

serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
toml = "1.1.2"

fastrand = "2.4.1"
parking_lot = "0.12.5"
arrayvec = { version = "0.7.8", features = ["serde"] }
smallvec = "1.15.2"
itertools = "0.15.0"
dirs = "6.0.0"
thiserror = "2.0.18"
base64 = "0.22.1"
url = "2.5.8"
sha2 = { version = "0.11.0", default-features = false }
bytemuck = { workspace = true }
webbrowser = "1.2.1"
ureq = { version = "3.3.0", default-features = false, features = ["rustls"] }

[lints]
workspace = true
