[package]
name = "cantus_cpu"
version = "0.7.0"
edition = "2024"
build = "build.rs"

[[bin]]
name = "cantus"
path = "src/main.rs"

[features]
default = ["spotify"]
spotify = ["webbrowser"]

[dependencies]
cantus_shared = { path = "../cantus_shared", features = ["cpu"] }
glam = { workspace = true }
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }

pollster = "0.4.0"
raw-window-handle = "0.6.2"

wayland-backend = { version = "0.3.15", features = ["client_system"] }
wayland-client = { version = "0.31.14", default-features = false }
wayland-protocols = { version = "0.32.13", features = ["client", "staging"] }
wayland-protocols-wlr = { version = "0.3.12", features = ["client"] }

wgpu = { version = "29.0.3", default-features = false, features = [
    "parking_lot",
    "spirv",
    "std",
    "vulkan",
    "wgsl",
] }
wgpu_text = { version = "29.0.3", default-features = false }

time = { version = "0.3.53", features = ["serde"] }
image = { version = "0.25.10", default-features = false, features = [
    "jpeg",
    "png",
] }
kmeans_colors = { version = "0.7.1", default-features = false, features = [
    "palette_color",
] }
palette = "0.7.6"

serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
toml = "1.1.2"

fastrand = "2.4.1"
tap = "1"
parking_lot = "0.12.5"
dashmap = "6.2.1"
arrayvec = { version = "0.7.7", features = ["serde"] }
itertools = "0.15.0"
dirs = "6.0.0"
thiserror = "2.0.18"
base64 = "0.22.1"
url = "2.5.8"
sha2 = "0.11.0"
bytemuck = { version = "1.25.0", features = ["derive"] }

ureq = { version = "3.3.0", default-features = false, features = ["rustls"] }
webbrowser = { version = "1.2.1", optional = true }

[build-dependencies]
spirv-builder = { git = "https://github.com/Rust-GPU/rust-gpu", rev = "bd49568baf08301107c9f698494735724980dee0" }

[lints]
workspace = true
